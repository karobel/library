<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --accent:    #c8a96e;
      --accent2:   #e8c98e;
      --danger:    #c0392b;
      --success:   #27ae60;
      --text:      #e8e0d4;
      --muted:     #888070;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-mono:  'DM Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* ── LAYOUT ── */
    .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
    }
    .header-left h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--accent2);
    }
    .header-left p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .stats {
      display: flex;
      gap: 28px;
    }
    .stat {
      text-align: right;
    }
    .stat-value {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    /* ── MAIN ── */
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 0;
    }

    /* ── SIDEBAR ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
    }
    .sidebar-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 0 8px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      text-align: left;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .nav-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
    .nav-btn .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── CONTENT ── */
    .content { padding: 32px 40px; overflow-y: auto; }

    /* ── SEARCH BAR ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      transition: border-color 0.15s;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn-ghost { background: none; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-danger { background: none; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .section-count {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      cursor: pointer;
      animation: rowIn 0.25s ease both;
    }
    tbody tr:hover { background: var(--surface); }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    td {
      padding: 13px 14px;
      font-size: 13px;
      vertical-align: middle;
    }
    .td-title { font-weight: 500; color: var(--accent2); max-width: 220px; }
    .td-title span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-author { color: var(--text); }
    .td-isbn { color: var(--muted); font-size: 12px; }
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .td-price { color: var(--accent); font-weight: 500; }
    .td-stock { color: var(--text); }
    .stock-low { color: var(--danger) !important; }
    .td-actions { display: flex; gap: 6px; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.2s ease;
      margin: 20px;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 700;
    }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px 28px; }
    .modal-footer {
      padding: 16px 28px 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    input, select {
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }
    .field-error { font-size: 11px; color: var(--danger); margin-top: 2px; }

    /* ── DETAIL VIEW ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .detail-item label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .detail-item .val {
      font-size: 15px;
      color: var(--text);
      margin-top: 4px;
    }
    .detail-item.full { grid-column: 1 / -1; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-msg {
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 13px;
      border-left: 3px solid;
      background: var(--surface);
      animation: toastIn 0.2s ease;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .toast-msg.success { border-color: var(--success); color: var(--success); }
    .toast-msg.error   { border-color: var(--danger);  color: var(--danger); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── CONFIRM MODAL ── */
    #confirm-modal .modal { max-width: 380px; }
    #confirm-text { color: var(--muted); font-size: 13px; line-height: 1.6; margin-top: 6px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      aside { display: none; }
      .content { padding: 20px; }
      header { padding: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-item.full { grid-column: 1; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>📚 Library Manager</h1>
      <p>Book collection · CRUD system</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Books</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-stock">0</div>
        <div class="stat-label">In Stock</div>
      </div>
    </div>
  </header>

  <main>
    <!-- SIDEBAR -->
    <aside>
      <div class="sidebar-title">Navigation</div>
      <button class="nav-btn active" onclick="showView('list')" id="nav-list">
        <span class="icon">☰</span> All Books
      </button>
      <button class="nav-btn" onclick="openAddModal()" id="nav-add">
        <span class="icon">＋</span> Add Book
      </button>
      <div class="nav-divider"></div>
      <div class="sidebar-title" style="margin-top:4px">Filter by Genre</div>
      <div id="genre-filters"></div>
    </aside>

    <!-- CONTENT -->
    <div class="content">
      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Search by title, author or genre…" oninput="onSearch()" />
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">＋ Add Book</button>
      </div>

      <!-- BOOK LIST VIEW -->
      <div id="view-list">
        <div class="section-header">
          <span class="section-title">Collection</span>
          <span class="section-count" id="list-count"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Genre</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="book-table-body"></tbody>
          </table>
        </div>
        <div id="empty-state" class="empty" style="display:none">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No books found</div>
          <p>Try a different search term or add a new book.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-backdrop" id="book-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Book</span>
      <button class="modal-close" onclick="closeModal('book-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Title *</label>
          <input type="text" id="f-title" placeholder="e.g. The Pragmatic Programmer" />
          <span class="field-error" id="err-title"></span>
        </div>
        <div class="form-group">
          <label>Author *</label>
          <input type="text" id="f-author" placeholder="First Last" />
          <span class="field-error" id="err-author"></span>
        </div>
        <div class="form-group">
          <label>ISBN *</label>
          <input type="text" id="f-isbn" placeholder="978-0000000000" />
          <span class="field-error" id="err-isbn"></span>
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="f-genre" placeholder="e.g. Programming" />
        </div>
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" id="f-price" placeholder="19.99" min="0" step="0.01" />
          <span class="field-error" id="err-price"></span>
        </div>
        <div class="form-group">
          <label>Stock *</label>
          <input type="number" id="f-stock" placeholder="10" min="0" />
          <span class="field-error" id="err-stock"></span>
        </div>
        <div class="form-group">
          <label>Published Date</label>
          <input type="date" id="f-date" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('book-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBook()">Save Book</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detail-modal-title">Book Details</span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="detail-body"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')">Close</button>
      <button class="btn btn-ghost btn-sm" id="detail-edit-btn">✏ Edit</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title">Confirm Deletion</span>
      <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirm-text"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   DATA LAYER — in-memory store (localStorage for persistence)
   ═══════════════════════════════════════ */

const STORAGE_KEY = 'lms_books_v1';

let books = [];
let nextId = 1;
let editingId = null;
let activeGenre = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      books = parsed.books || [];
      nextId = parsed.nextId || 1;
      return;
    }
  } catch(e) {}
  // Seed demo data
  const demo = [
    { title:'The Pragmatic Programmer', author:'David Thomas & Andrew Hunt', isbn:'978-0135957059', genre:'Programming',    price:45.99, stock:12, date:'2019-09-13' },
    { title:'Clean Code',              author:'Robert C. Martin',           isbn:'978-0132350884', genre:'Programming',    price:38.00, stock:7,  date:'2008-08-01' },
    { title:'1984',                    author:'George Orwell',              isbn:'978-0451524935', genre:'Dystopian',      price:12.99, stock:20, date:'1949-06-08' },
    { title:'Dune',                    author:'Frank Herbert',              isbn:'978-0441013593', genre:'Science Fiction', price:14.50, stock:15, date:'1965-08-01' },
    { title:'Atomic Habits',           author:'James Clear',                isbn:'978-0735211292', genre:'Self-Help',      price:18.00, stock:30, date:'2018-10-16' },
    { title:'The Design of Everyday Things', author:'Don Norman',          isbn:'978-0465050659', genre:'UX / Design',    price:22.00, stock:5,  date:'2013-11-05' },
  ];
  demo.forEach(d => {
    books.push({ id: nextId++, ...d });
  });
  saveData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ books, nextId }));
}

/* ═══════════════════════════════════════
   CRUD OPERATIONS
   ═══════════════════════════════════════ */

function createBook(data) {
  if (books.some(b => b.isbn.toLowerCase() === data.isbn.toLowerCase())) {
    throw new Error(`ISBN "${data.isbn}" already exists.`);
  }
  const book = { id: nextId++, ...data };
  books.push(book);
  saveData();
  return book;
}

function readAll(keyword = '', genre = null) {
  let list = [...books];
  if (genre) list = list.filter(b => b.genre === genre);
  if (keyword) {
    const k = keyword.toLowerCase();
    list = list.filter(b =>
      b.title.toLowerCase().includes(k) ||
      b.author.toLowerCase().includes(k) ||
      b.genre.toLowerCase().includes(k)
    );
  }
  return list;
}

function readById(id) {
  return books.find(b => b.id === id) || null;
}

function updateBook(id, data) {
  const idx = books.findIndex(b => b.id === id);
  if (idx === -1) throw new Error('Book not found.');
  const collision = books.find(b => b.isbn.toLowerCase() === data.isbn.toLowerCase() && b.id !== id);
  if (collision) throw new Error(`ISBN "${data.isbn}" is already used by another book.`);
  books[idx] = { id, ...data };
  saveData();
  return books[idx];
}

function deleteBook(id) {
  const idx = books.findIndex(b => b.id === id);
  if (idx === -1) throw new Error('Book not found.');
  books.splice(idx, 1);
  saveData();
}

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */

function render() {
  const keyword = document.getElementById('search-input').value;
  const filtered = readAll(keyword, activeGenre);

  // Stats
  document.getElementById('stat-total').textContent = books.length;
  document.getElementById('stat-stock').textContent = books.reduce((s, b) => s + b.stock, 0);
  document.getElementById('list-count').textContent = filtered.length + ' book' + (filtered.length !== 1 ? 's' : '');

  // Table
  const tbody = document.getElementById('book-table-body');
  tbody.innerHTML = '';
  document.getElementById('empty-state').style.display = filtered.length ? 'none' : 'block';

  filtered.forEach((b, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 30) + 'ms';
    tr.innerHTML = `
      <td class="td-title"><span title="${esc(b.title)}">${esc(b.title)}</span></td>
      <td class="td-author">${esc(b.author)}</td>
      <td class="td-isbn">${esc(b.isbn)}</td>
      <td><span class="tag">${esc(b.genre || '—')}</span></td>
      <td class="td-price">$${Number(b.price).toFixed(2)}</td>
      <td class="td-stock ${b.stock < 3 ? 'stock-low' : ''}">${b.stock}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-ghost btn-sm" onclick="openDetail(${b.id});event.stopPropagation()">View</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${b.id});event.stopPropagation()">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete(${b.id});event.stopPropagation()">Delete</button>
        </div>
      </td>`;
    tr.onclick = () => openDetail(b.id);
    tbody.appendChild(tr);
  });

  // Genre sidebar
  renderGenreFilters();
}

function renderGenreFilters() {
  const genres = [...new Set(books.map(b => b.genre).filter(Boolean))].sort();
  const wrap = document.getElementById('genre-filters');
  wrap.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'nav-btn' + (activeGenre === null ? ' active' : '');
  allBtn.innerHTML = `<span class="icon">◈</span> All Genres`;
  allBtn.onclick = () => { activeGenre = null; render(); };
  wrap.appendChild(allBtn);

  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (activeGenre === g ? ' active' : '');
    btn.innerHTML = `<span class="icon">◦</span> ${esc(g)}`;
    btn.onclick = () => { activeGenre = g; render(); };
    wrap.appendChild(btn);
  });
}

/* ═══════════════════════════════════════
   MODALS
   ═══════════════════════════════════════ */

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add New Book';
  clearForm();
  openModal('book-modal');
}

function openEditModal(id) {
  const b = readById(id);
  if (!b) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Book';
  document.getElementById('f-title').value  = b.title;
  document.getElementById('f-author').value = b.author;
  document.getElementById('f-isbn').value   = b.isbn;
  document.getElementById('f-genre').value  = b.genre || '';
  document.getElementById('f-price').value  = b.price;
  document.getElementById('f-stock').value  = b.stock;
  document.getElementById('f-date').value   = b.date || '';
  clearErrors();
  openModal('book-modal');
}

function openDetail(id) {
  const b = readById(id);
  if (!b) return;
  document.getElementById('detail-modal-title').textContent = b.title;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-item full">
      <label>Title</label>
      <div class="val" style="font-family:var(--font-serif);font-size:1.1rem;color:var(--accent2)">${esc(b.title)}</div>
    </div>
    <div class="detail-item"><label>Author</label><div class="val">${esc(b.author)}</div></div>
    <div class="detail-item"><label>ISBN</label><div class="val" style="color:var(--muted)">${esc(b.isbn)}</div></div>
    <div class="detail-item"><label>Genre</label><div class="val"><span class="tag">${esc(b.genre||'—')}</span></div></div>
    <div class="detail-item"><label>Price</label><div class="val" style="color:var(--accent)">$${Number(b.price).toFixed(2)}</div></div>
    <div class="detail-item"><label>Stock</label><div class="val ${b.stock < 3 ? 'stock-low' : ''}">${b.stock} copies</div></div>
    <div class="detail-item"><label>Published</label><div class="val">${b.date || 'N/A'}</div></div>
    <div class="detail-item"><label>ID</label><div class="val" style="color:var(--muted)">#${b.id}</div></div>
  `;
  document.getElementById('detail-edit-btn').onclick = () => { closeModal('detail-modal'); openEditModal(id); };
  openModal('detail-modal');
}

function confirmDelete(id) {
  const b = readById(id);
  if (!b) return;
  document.getElementById('confirm-text').textContent =
    `Are you sure you want to delete "${b.title}" by ${b.author}? This action cannot be undone.`;
  document.getElementById('confirm-ok-btn').onclick = () => {
    deleteBook(id);
    closeModal('confirm-modal');
    render();
    toast('Book deleted.', 'success');
  };
  openModal('confirm-modal');
}

function saveBook() {
  clearErrors();
  const data = {
    title:  document.getElementById('f-title').value.trim(),
    author: document.getElementById('f-author').value.trim(),
    isbn:   document.getElementById('f-isbn').value.trim(),
    genre:  document.getElementById('f-genre').value.trim(),
    price:  parseFloat(document.getElementById('f-price').value),
    stock:  parseInt(document.getElementById('f-stock').value),
    date:   document.getElementById('f-date').value,
  };

  // Validation
  let valid = true;
  if (!data.title)          { setErr('err-title', 'Title is required.'); valid = false; }
  if (!data.author)         { setErr('err-author', 'Author is required.'); valid = false; }
  if (!data.isbn)           { setErr('err-isbn', 'ISBN is required.'); valid = false; }
  if (isNaN(data.price) || data.price < 0) { setErr('err-price', 'Enter a valid positive price.'); valid = false; }
  if (isNaN(data.stock) || data.stock < 0) { setErr('err-stock', 'Enter a valid stock quantity.'); valid = false; }
  if (!valid) return;

  try {
    if (editingId !== null) {
      updateBook(editingId, data);
      toast('Book updated successfully!', 'success');
    } else {
      createBook(data);
      toast('Book added successfully!', 'success');
    }
    closeModal('book-modal');
    render();
  } catch(e) {
    toast(e.message, 'error');
    if (e.message.includes('ISBN')) setErr('err-isbn', e.message);
  }
}

/* ═══════════════════════════════════════
   UTILS
   ═══════════════════════════════════════ */

function onSearch() { render(); }
function showView(v) {
  document.querySelectorAll('[id^="nav-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
});

function clearForm() {
  ['f-title','f-author','f-isbn','f-genre','f-price','f-stock','f-date']
    .forEach(id => document.getElementById(id).value = '');
  clearErrors();
}
function clearErrors() {
  ['err-title','err-author','err-isbn','err-price','err-stock']
    .forEach(id => document.getElementById(id).textContent = '');
}
function setErr(id, msg) { document.getElementById(id).textContent = msg; }

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Keyboard: Escape closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    document.querySelectorAll('.modal-backdrop.open').forEach(m => m.classList.remove('open'));
});

/* ═══════════════════════════════════════
   BOOT
   ═══════════════════════════════════════ */
loadData();
render();
</script>
</body>
</html>
